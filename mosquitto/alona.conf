# Alona OS — Mosquitto drop-in (installed to /etc/mosquitto/conf.d/alona.conf)
# Trusted LAN only; enable auth/TLS before exposing beyond the site.

listener 1883 0.0.0.0
protocol mqtt

allow_anonymous true

# keep logs manageable on a Pi SD card
log_type error
log_type warning
log_type notice

# persistence survives broker restarts
persistence true
persistence_location /var/lib/mosquitto/
